<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MementoMundi — Tienda</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Nunito', sans-serif; background: #EAE7DA; color: #0B2150; }

  :root {
    --cream:  #EAE7DA;
    --orange: #FA9223;
    --teal:   #5CA4A4;
    --navy:   #0B2150;
    --white:  #FFFFFF;
  }

  /* scrollbar hide */
  .mm-scroll::-webkit-scrollbar { width: 0; }
  .mm-scroll { scrollbar-width: none; }

  /* nav transitions */
  .mm-icon-btn { transition: background .15s, transform .15s; border-radius: 8px; }
  .mm-icon-btn:hover { background: rgba(11,33,80,0.12) !important; transform: scale(1.06); }
  .mm-avatar-btn { transition: transform .15s; cursor: pointer; }
  .mm-avatar-btn:hover { transform: scale(1.08); }
  .mm-nav-item { transition: background .15s, padding-left .15s; cursor: pointer; }
  .mm-nav-item:hover { background: rgba(11,33,80,0.05) !important; padding-left: 26px !important; }
  .mm-help { transition: transform .2s; cursor: pointer; }
  .mm-help:hover { transform: translateY(-2px) rotate(-4deg); }

  /* ── HERO ── */
  .hero {
    position: relative;
    height: 100svh;
    min-height: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0B2150;
    overflow: hidden;
  }
  .hero-bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }
  .hero-word {
    font-family: 'Playfair Display', serif;
    font-size: clamp(72px, 18vw, 200px);
    font-weight: 900;
    color: #EAE7DA;
    letter-spacing: -0.02em;
    line-height: 1;
    position: relative;
    z-index: 2;
    text-align: center;
    user-select: none;
  }
  .hero-sub {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(13px, 2.5vw, 17px);
    font-weight: 600;
    color: rgba(234,231,218,0.55);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 14px;
    position: relative;
    z-index: 2;
  }
  .hero-scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.4;
    animation: bounceY 1.8s ease-in-out infinite;
    z-index: 2;
    color: #EAE7DA;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  @keyframes bounceY {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(8px); }
  }

  /* ── TOP NAV (sticky over everything) ── */
  .top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px clamp(14px, 4vw, 24px);
    transition: background .3s, backdrop-filter .3s, box-shadow .3s;
  }
  .top-nav.scrolled {
    background: rgba(234,231,218,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 16px rgba(11,33,80,0.08);
  }
  .top-nav.hero-zone {
    background: transparent;
  }
  .top-nav.hero-zone .ham-bar { background: #EAE7DA; }
  .top-nav.scrolled .ham-bar  { background: #0B2150; }
  .top-nav.hero-zone .nav-logo { filter: brightness(0) invert(1); }
  .top-nav.scrolled .nav-logo  { filter: none; }

  /* ── PACKS SECTION ── */
  .packs-section {
    padding: clamp(48px, 8vw, 96px) clamp(16px, 5vw, 64px) 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(24px, 4vw, 36px);
    background: #EAE7DA;
  }
  .section-label {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #0B2150;
    opacity: 0.4;
    margin-bottom: 4px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 4vw, 34px);
    font-weight: 900;
    color: #0B2150;
    text-align: center;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  /* ── PACK CARD ── */
  .pack-cards-grid {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 3vw, 28px);
  }
  .pack-card {
    position: relative;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(11,33,80,0.08), 0 1px 4px rgba(11,33,80,0.05);
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: box-shadow .25s cubic-bezier(.2,.7,.2,1), border-color .25s, transform .25s, background .25s;
    display: flex;
    flex-direction: row;
    min-height: 200px;
  }
  .pack-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(11,33,80,0.14), 0 3px 8px rgba(11,33,80,0.08);
  }
  .pack-card.selected {
    border-color: var(--card-accent, #FA9223);
    background: var(--card-bg, #FFF8F0);
    box-shadow: 0 8px 32px rgba(11,33,80,0.13), 6px 6px 0px var(--card-accent, #FA9223);
    transform: translateY(-2px);
  }
  .pack-img-col {
    flex-shrink: 0;
    width: clamp(130px, 30%, 200px);
    background: var(--card-img-bg, #F0EDE5);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .pack-img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px;
    opacity: 0.5;
  }
  .pack-content-col {
    flex: 1;
    padding: clamp(18px, 3vw, 28px) clamp(16px, 3vw, 28px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 12px;
  }
  .pack-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--card-tag-bg, #FA922320);
    color: var(--card-accent, #FA9223);
    border-radius: 99px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: fit-content;
  }
  .pack-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3.5vw, 26px);
    font-weight: 900;
    color: #0B2150;
    line-height: 1.15;
  }
  .pack-desc {
    font-size: clamp(12px, 1.8vw, 14px);
    color: #0B2150;
    opacity: 0.55;
    line-height: 1.55;
  }
  .pack-price {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 900;
    color: var(--card-accent, #FA9223);
  }
  .pack-price-sub {
    font-size: 12px;
    color: #0B2150;
    opacity: 0.4;
    font-weight: 600;
    margin-top: 2px;
  }
  .pack-check {
    position: absolute;
    top: 14px; right: 14px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--card-accent, #FA9223);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    transform: scale(0.5);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .pack-card.selected .pack-check {
    opacity: 1;
    transform: scale(1);
  }

  /* ── STICKER SAMPLES in image column ── */
  .sticker-sample {
    position: absolute;
    border-radius: 10px;
    box-shadow: 2px 3px 10px rgba(11,33,80,0.18);
    transition: transform .3s;
  }
  .pack-card.selected .sticker-sample {
    transform: scale(1.05) rotate(var(--rot, 0deg));
  }

  /* ── ADD TO CART BUTTON (fixed bottom) ── */
  .cart-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 90;
    padding: 14px clamp(14px, 5vw, 32px) max(18px, env(safe-area-inset-bottom));
    background: rgba(234,231,218,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1.5px solid rgba(11,33,80,0.08);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .cart-btn {
    flex: 1;
    max-width: 500px;
    margin: 0 auto;
    background: #FA9223;
    color: white;
    border: none;
    border-radius: 99px;
    padding: 16px 28px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: clamp(15px, 2.5vw, 18px);
    cursor: pointer;
    box-shadow: 3px 3px 0px #0B2150;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform .15s, box-shadow .15s, background .15s;
  }
  .cart-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 5px 5px 0px #0B2150;
    background: #FB9F36;
  }
  .cart-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0px #0B2150;
  }
  .cart-btn.disabled {
    background: rgba(11,33,80,0.18);
    color: rgba(11,33,80,0.4);
    box-shadow: none;
    cursor: default;
    transform: none;
  }

  /* ── DRAWER ── */
  .drawer-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(11,33,80,0.35);
  }
  .drawer-panel {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(82%, 320px);
    background: #EAE7DA;
    background-image: radial-gradient(circle, #0B215010 1px, transparent 1px);
    background-size: 18px 18px;
    border-radius: 0 28px 28px 0;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 6px 0 32px rgba(11,33,80,0.14);
    z-index: 201;
  }

  @media (min-width: 640px) {
    .pack-card { min-height: 220px; }
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Mascot ── */
function Mascot({ size=80, wink=false, handUp=false, color="#0B2150" }) {
  return (
    <svg width={size} height={size*1.3} viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="38" y="72" width="12" height="35" rx="4" fill={color}/>
      <rect x="52" y="72" width="12" height="35" rx="4" fill={color}/>
      <ellipse cx="44" cy="109" rx="10" ry="5" fill={color}/>
      <ellipse cx="58" cy="109" rx="10" ry="5" fill={color}/>
      <circle cx="50" cy="42" r="32" fill="white" stroke={color} strokeWidth="3"/>
      <path d="M72 16 L82 26 L72 26 Z" fill="#EAE7DA" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {wink ? (
        <>
          <ellipse cx="42" cy="42" rx="3" ry="4" fill={color}/>
          <path d="M50 41 Q54 38 58 41" stroke={color} strokeWidth="2.5" strokeLinecap="round" fill="none"/>
        </>
      ) : (
        <>
          <ellipse cx="42" cy="42" rx="3" ry="4" fill={color}/>
          <ellipse cx="58" cy="42" rx="3" ry="4" fill={color}/>
        </>
      )}
      {handUp && (
        <>
          <line x1="50" y1="80" x2="20" y2="55" stroke={color} strokeWidth="3" strokeLinecap="round"/>
          <circle cx="16" cy="52" r="5" fill={color}/>
          <text x="2" y="40" fontSize="18" fill={color} fontWeight="bold" fontFamily="Nunito,sans-serif">?</text>
        </>
      )}
    </svg>
  );
}

/* ── Avatar ── */
function Avatar({ name, size=32, bg="#5CA4A4" }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:"50%", background:bg,
      display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:size*0.38, fontWeight:700, color:"white",
      flexShrink:0, border:"2px solid white"
    }}>{name[0].toUpperCase()}</div>
  );
}

/* ── Sticker decoration SVGs in image column ── */
function StickerSet({ count, accent }) {
  const stickers = [
    { emoji:"🏛️", x:"18%", y:"20%", rot:"-12deg", size:42 },
    { emoji:"🌊", x:"55%", y:"10%", rot:"8deg",   size:36 },
    { emoji:"🗼", x:"10%", y:"55%", rot:"5deg",   size:38 },
    { emoji:"🌸", x:"58%", y:"50%", rot:"-9deg",  size:40 },
    { emoji:"🦋", x:"30%", y:"68%", rot:"14deg",  size:34 },
    { emoji:"⛵", x:"65%", y:"72%", rot:"-6deg",  size:36 },
    { emoji:"🍊", x:"40%", y:"30%", rot:"3deg",   size:32 },
  ];
  const visible = stickers.slice(0, count);
  return (
    <div style={{position:"relative",width:"100%",height:"100%",minHeight:160}}>
      {visible.map((s,i) => (
        <div key={i} style={{
          position:"absolute",
          left:s.x, top:s.y,
          fontSize:s.size,
          lineHeight:1,
          transform:`rotate(${s.rot})`,
          filter:"drop-shadow(2px 3px 6px rgba(11,33,80,0.22))",
          transition:"transform .3s",
          userSelect:"none"
        }}>{s.emoji}</div>
      ))}
    </div>
  );
}

/* ── Canvas decoration for pack 3 ── */
function CanvasDeco() {
  return (
    <div style={{
      width:"80%", aspectRatio:"3/2",
      background:"white",
      borderRadius:10,
      boxShadow:"0 4px 18px rgba(11,33,80,0.15), 3px 3px 0 #0B2150",
      border:"2px solid #0B2150",
      display:"flex", alignItems:"center", justifyContent:"center",
      flexDirection:"column", gap:6,
      padding:12, position:"relative"
    }}>
      <div style={{fontSize:28}}>🗺️</div>
      <p style={{
        fontSize:9, fontWeight:800, color:"#0B2150", opacity:0.4,
        letterSpacing:"0.12em", textTransform:"uppercase",
        textAlign:"center", fontFamily:"'Playfair Display',serif"
      }}>Lienzo de<br/>Recuerdo</p>
      {/* corner stickers */}
      {["🏛️","🌊"].map((e,i)=>(
        <div key={i} style={{
          position:"absolute",
          top: i===0 ? -10 : "auto",
          bottom: i===1 ? -10 : "auto",
          right: i===0 ? -10 : "auto",
          left: i===1 ? -10 : "auto",
          fontSize:22,
          transform:`rotate(${i===0?15:-10}deg)`,
          filter:"drop-shadow(1px 2px 4px rgba(0,0,0,0.2))"
        }}>{e}</div>
      ))}
    </div>
  );
}

/* ── Nav items ── */
const NAV_ITEMS = [
  { label:"Viajes",         icon:"✈️",  href:"MementoMundi Home.html" },
  { label:"RRSS",           icon:"🌍",  href:"#" },
  { label:"Tienda",         icon:"🛒",  href:"#", active:true },
  { label:"Favoritos",      icon:"❤️",  href:"#" },
  { label:"Carrito",        icon:"🧺",  href:"#" },
  { label:"Usuario",        icon:"👤",  href:"#" },
  { label:"Sobre Nosotros", icon:"💛",  href:"#" },
];

/* ── PACKS data ── */
const PACKS = [
  {
    id:"pack10",
    tag:"Starter",
    name:"Pack 10\nPegatinas",
    desc:"Perfecto para tu primer viaje. 10 pegatinas originales ilustradas a mano para empezar a dejar huella.",
    price:"9,90€",
    priceSub:"envío incluido",
    accent:"#5CA4A4",
    tagBg:"#5CA4A420",
    imgBg:"#EBF5F5",
    cardBg:"#F3FAFA",
    stickerCount:3,
  },
  {
    id:"pack20",
    tag:"Popular",
    name:"Pack 20\nPegatinas",
    desc:"El favorito de la comunidad. 20 pegatinas para llenar tu álbum de aventuras sin parar.",
    price:"17,90€",
    priceSub:"¡ahorra 2€!",
    accent:"#FA9223",
    tagBg:"#FA922320",
    imgBg:"#FFF3E6",
    cardBg:"#FFF8F0",
    stickerCount:5,
    bestseller:true,
  },
  {
    id:"pack50",
    tag:"Premium",
    name:"Pack 50+\nPegatinas\n+ Lienzo de Recuerdo",
    desc:"La experiencia completa. Más de 50 pegatinas exclusivas y un Lienzo de Recuerdo para enmarcar tu aventura.",
    price:"39,90€",
    priceSub:"edición limitada",
    accent:"#0B2150",
    tagBg:"#0B215018",
    imgBg:"#E8EDF5",
    cardBg:"#F0F3F8",
    stickerCount:7,
    canvas:true,
  },
];

/* ═══════════════════════════════════════════
   TIENDA APP
   ═══════════════════════════════════════════ */
function TiendaApp() {
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [selectedPack, setSelectedPack] = useState(null);
  const [scrolled, setScrolled] = useState(false);
  const heroRef = useRef(null);

  /* nav color switch on scroll */
  useEffect(() => {
    const onScroll = () => {
      const hero = heroRef.current;
      if (!hero) return;
      const heroBottom = hero.getBoundingClientRect().bottom;
      setScrolled(heroBottom <= 60);
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const selectedData = PACKS.find(p => p.id === selectedPack);

  return (
    <>
      {/* ══ FIXED TOP NAV ══ */}
      <nav className={`top-nav ${scrolled ? "scrolled" : "hero-zone"}`}>
        {/* hamburger */}
        <button onClick={()=>setDrawerOpen(true)} className="mm-icon-btn" style={{
          background:"none", border:"none", cursor:"pointer",
          display:"flex", flexDirection:"column", gap:5, padding:6
        }}>
          {[0,1,2].map(i=>(
            <div key={i} className="ham-bar" style={{
              width:24, height:2.5, borderRadius:2,
              transition:"background .3s"
            }}/>
          ))}
        </button>

        {/* logo */}
        <img src="assets/MEMENTO_FRASE.svg" alt="Memento Mundi"
          className="nav-logo"
          style={{height:28, objectFit:"contain", maxWidth:"38vw", transition:"filter .3s"}}/>

        {/* avatar */}
        <div className="mm-avatar-btn">
          <Avatar name="Ana" size={34} bg="#066FB4"/>
        </div>
      </nav>

      {/* ══ HERO ══ */}
      <section className="hero" ref={heroRef}>
        <div className="hero-bg-dots"/>

        {/* decorative stickers floating */}
        {[
          {e:"🏛️", x:"8%",  y:"22%", r:"-15deg", s:52},
          {e:"🌊", x:"82%", y:"15%", r:"10deg",  s:44},
          {e:"🗼", x:"75%", y:"68%", r:"-8deg",  s:48},
          {e:"🌸", x:"12%", y:"70%", r:"12deg",  s:40},
          {e:"⛵", x:"50%", y:"82%", r:"5deg",   s:36},
        ].map((s,i)=>(
          <div key={i} style={{
            position:"absolute", left:s.x, top:s.y,
            fontSize:s.s, lineHeight:1,
            transform:`rotate(${s.r})`,
            filter:"drop-shadow(2px 4px 12px rgba(0,0,0,0.35))",
            opacity:0.65,
            userSelect:"none",
            pointerEvents:"none",
            animation:`float${i} ${3+i*0.4}s ease-in-out infinite alternate`
          }}>{s.e}</div>
        ))}

        <style>{`
          @keyframes float0{from{transform:rotate(-15deg) translateY(0)}to{transform:rotate(-15deg) translateY(-12px)}}
          @keyframes float1{from{transform:rotate(10deg) translateY(0)}to{transform:rotate(10deg) translateY(-10px)}}
          @keyframes float2{from{transform:rotate(-8deg) translateY(0)}to{transform:rotate(-8deg) translateY(-14px)}}
          @keyframes float3{from{transform:rotate(12deg) translateY(0)}to{transform:rotate(12deg) translateY(-8px)}}
          @keyframes float4{from{transform:rotate(5deg) translateY(0)}to{transform:rotate(5deg) translateY(-11px)}}
        `}</style>

        <h1 className="hero-word">MEMENTO</h1>
        <p className="hero-sub">Tu tienda de recuerdos</p>

        <div className="hero-scroll-hint">
          <span>Descubrir</span>
          <svg width="16" height="20" viewBox="0 0 16 20" fill="none">
            <path d="M8 2 L8 14 M3 10 L8 16 L13 10" stroke="#EAE7DA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </section>

      {/* ══ PACKS SECTION ══ */}
      <section className="packs-section">
        <div style={{textAlign:"center",marginBottom:8}}>
          <p className="section-label">Elige tu pack</p>
          <h2 className="section-title">Llena tu álbum de aventuras</h2>
          <p style={{fontSize:14,color:"#0B2150",opacity:0.5,maxWidth:400,margin:"0 auto",lineHeight:1.6}}>
            Pegatinas originales ilustradas a mano.<br/>Cada una cuenta una historia.
          </p>
        </div>

        <div className="pack-cards-grid">
          {PACKS.map(pack => {
            const isSelected = selectedPack === pack.id;
            const nameParts = pack.name.split("\n");
            return (
              <div
                key={pack.id}
                className={`pack-card${isSelected ? " selected" : ""}`}
                style={{
                  "--card-accent": pack.accent,
                  "--card-bg": pack.cardBg,
                  "--card-tag-bg": pack.tagBg,
                  "--card-img-bg": pack.imgBg,
                }}
                onClick={() => setSelectedPack(isSelected ? null : pack.id)}
              >
                {/* checkmark */}
                <div className="pack-check">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2.5 7L5.5 10L11.5 4" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>

                {/* bestseller ribbon */}
                {pack.bestseller && (
                  <div style={{
                    position:"absolute", top:14, left:14, zIndex:4,
                    background:"#FA9223", color:"white",
                    padding:"3px 10px", borderRadius:99,
                    fontSize:10, fontWeight:800,
                    letterSpacing:"0.08em", textTransform:"uppercase",
                    boxShadow:"2px 2px 0 #0B2150"
                  }}>⭐ Más vendido</div>
                )}

                {/* image column */}
                <div className="pack-img-col">
                  <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
                    {pack.canvas ? <CanvasDeco/> : <StickerSet count={pack.stickerCount} accent={pack.accent}/>}
                  </div>
                </div>

                {/* content column */}
                <div className="pack-content-col">
                  <div>
                    <div className="pack-tag">{pack.tag}</div>
                    <h3 className="pack-name" style={{marginTop:8}}>
                      {nameParts.map((line,i)=>(
                        <span key={i} style={{display:"block"}}>{line}</span>
                      ))}
                    </h3>
                    <p className="pack-desc" style={{marginTop:8}}>{pack.desc}</p>
                  </div>
                  <div>
                    <div className="pack-price">{pack.price}</div>
                    <div className="pack-price-sub">{pack.priceSub}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </section>

      {/* ══ MASCOTA FIJA ══ */}
      <div className="mm-help" style={{
        position:"fixed", bottom:90, left:14, zIndex:80,
        display:"flex", flexDirection:"column", alignItems:"center"
      }}>
        <Mascot size={42} handUp={true} color="#0B2150"/>
        <span style={{fontSize:9,fontWeight:700,color:"#0B2150",opacity:0.45,letterSpacing:"0.05em",marginTop:1}}>Ayuda</span>
      </div>

      {/* ══ CART BAR ══ */}
      <div className="cart-bar">
        <button
          className={`cart-btn${selectedPack ? "" : " disabled"}`}
          disabled={!selectedPack}
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          {selectedPack
            ? `Añadir al carrito — ${selectedData?.price}`
            : "Selecciona un pack"}
        </button>
      </div>

      {/* ══ DRAWER ══ */}
      {drawerOpen && (
        <>
          <div className="drawer-backdrop" onClick={()=>setDrawerOpen(false)}/>
          <div className="drawer-panel">
            {/* header */}
            <div style={{
              display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"20px 22px 16px",
              borderBottom:"2px solid rgba(11,33,80,0.07)"
            }}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{
                  width:44,height:44,borderRadius:"50%",
                  background:"#066FB4",border:"2.5px solid #0B2150",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontWeight:800,fontSize:18,color:"white",flexShrink:0
                }}>A</div>
                <div>
                  <p style={{color:"#0B2150",fontWeight:800,fontSize:16,fontFamily:"'Playfair Display',serif"}}>Ana García</p>
                  <p style={{color:"#0B2150",opacity:0.4,fontSize:11}}>@anaviajera</p>
                </div>
              </div>
              <button onClick={()=>setDrawerOpen(false)} className="mm-icon-btn" style={{
                background:"#0B215015",border:"none",
                borderRadius:"50%",width:32,height:32,
                color:"#0B2150",fontSize:15,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center"
              }}>✕</button>
            </div>

            {/* nav */}
            <nav style={{flex:1,overflowY:"auto",padding:"10px 0"}} className="mm-scroll">
              {NAV_ITEMS.map((item,idx)=>(
                <a key={idx} href={item.href||"#"} style={{textDecoration:"none"}}>
                  <div className="mm-nav-item" style={{
                    display:"flex",alignItems:"center",gap:14,
                    padding:"14px 22px",
                    background: item.active ? "rgba(11,33,80,0.07)" : "transparent",
                    borderLeft: item.active ? "4px solid #FA9223" : "4px solid transparent",
                  }}>
                    <span style={{fontSize:20,lineHeight:1}}>{item.icon}</span>
                    <span style={{
                      fontWeight: item.active ? 800 : 700,
                      fontSize:17, color:"#0B2150",
                      opacity: item.active ? 1 : 0.7,
                      fontFamily: item.active ? "'Playfair Display',serif" : "'Nunito',sans-serif",
                      flex:1
                    }}>{item.label}</span>
                    {item.active && <div style={{width:8,height:8,borderRadius:"50%",background:"#FA9223"}}/>}
                  </div>
                </a>
              ))}

              <div style={{margin:"8px 22px",height:1.5,background:"rgba(11,33,80,0.08)",borderRadius:1}}/>

              <div className="mm-nav-item" style={{
                display:"flex",alignItems:"center",gap:14,padding:"12px 22px"
              }}>
                <Mascot size={28} handUp={true} color="#0B2150"/>
                <span style={{fontWeight:700,fontSize:17,color:"#0B2150",opacity:0.55}}>Ayuda</span>
              </div>
            </nav>

            {/* footer sin botón nuevo viaje */}
            <div style={{padding:"16px 22px 22px",borderTop:"2px solid rgba(11,33,80,0.07)"}}>
              <p style={{fontSize:11,color:"#0B2150",opacity:0.35,textAlign:"center",fontWeight:600,letterSpacing:"0.06em"}}>
                MEMENTO MUNDI © 2025
              </p>
            </div>
          </div>
        </>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TiendaApp/>);
</script>
</body>
</html>
