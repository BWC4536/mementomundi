<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MementoMundi RRSS — Responsive</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;}
body{font-family:'Nunito',sans-serif;background:#f0eee9;}

/* ── BOTTOM NAV (RRSS style) ── */
.bottom-nav{
  position:absolute; left:0; right:0; bottom:0;
  background:#EAE7DA;
  border-top:1.5px solid rgba(11,33,80,0.09);
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 8px 14px;
  z-index:30;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  font-size:9px;font-weight:800;color:#0B2150;
  padding:4px 6px;border-radius:12px;
  transition:opacity .15s,transform .15s;
  font-family:'Nunito',sans-serif;
}
.nav-btn:hover{transform:translateY(-1px);}
.nav-icon-wrap{display:flex;align-items:center;justify-content:center;}
.nav-btn.active .nav-icon-wrap{
  background:#FA922215;border-radius:10px;padding:4px;
  box-shadow:2px 2px 0 rgba(11,33,80,0.15);
}
.nav-qr{
  width:56px;height:56px;
  background:#FA9223;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid #0B2150;
  box-shadow:3px 3px 0 #0B2150;
  margin-top:-20px;
  transition:transform .15s,box-shadow .15s;
  position:relative;cursor:pointer;
}
.nav-qr:hover{transform:translate(-1px,-2px);box-shadow:5px 5px 0 #0B2150;}
.nav-qr::after{
  content:'';position:absolute;top:0;right:0;
  width:16px;height:16px;
  background:linear-gradient(135deg,rgba(255,255,255,0.3) 50%,transparent 50%);
  border-radius:0 14px 0 0;
}

/* ── PILLS / TABS ── */
.sticker-pill{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:99px;padding:5px 13px;
  font-weight:800;font-size:13px;
  cursor:pointer;border:none;
  font-family:'Nunito',sans-serif;
  transition:transform .15s;
}
.sticker-pill:hover{transform:rotate(-1deg) scale(1.04);}
.sticker-pill.active{background:#FA9223;color:white;box-shadow:2px 2px 0 #0B2150;}
.sticker-pill.inactive{background:rgba(11,33,80,0.09);color:rgba(11,33,80,0.5);}

/* ── STORIES ── */
.dot-bg{
  background-image:radial-gradient(circle,rgba(11,33,80,0.07) 1px,transparent 1px);
  background-size:20px 20px;
}
.stories-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.stories-scroll::-webkit-scrollbar{height:0;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;}
.story-avatar{width:58px;height:58px;border-radius:50%;position:relative;transition:transform .2s;}
.story-avatar:hover{transform:scale(1.07);}
.story-avatar-inner{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;
  border:2.5px solid #0B2150;overflow:hidden;
}
.story-pin{
  position:absolute;bottom:-4px;right:-4px;
  background:#FA9223;color:white;
  border-radius:99px;padding:2px 6px;
  font-size:8px;font-weight:800;
  border:1.5px solid #0B2150;
  box-shadow:1px 1px 0 #0B2150;
}
.story-label{font-size:10px;font-weight:700;color:#0B2150;opacity:0.6;text-align:center;max-width:62px;line-height:1.2;}

/* ── POST CARD ── */
.post-card{
  background:white;border-radius:22px;
  position:relative;
  box-shadow:0 4px 20px rgba(11,33,80,0.10),0 1px 4px rgba(11,33,80,0.06);
  transition:transform .25s cubic-bezier(.2,.7,.2,1),box-shadow .25s;
}
.post-card:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(11,33,80,0.15);}
.post-inner{border-radius:22px;overflow:hidden;}
.post-header{display:flex;align-items:center;gap:9px;padding:13px 14px 10px;}
.post-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:white;
  border:2px solid #0B2150;flex-shrink:0;
}
.post-user{font-weight:800;font-size:13px;color:#0B2150;}
.post-loc{font-size:11px;color:#0B2150;opacity:0.5;display:flex;align-items:center;gap:3px;margin-top:1px;}
.post-time{margin-left:auto;font-size:10px;color:#0B2150;opacity:0.35;}
.photo-wrap{margin:0 13px 12px;border-radius:16px;overflow:hidden;position:relative;}
.date-stamp{
  position:absolute;bottom:10px;left:10px;
  background:#EAE7DA;color:#0B2150;
  border-radius:8px;padding:4px 9px;
  font-size:11px;font-weight:800;
  border:1.5px solid #0B2150;
  box-shadow:2px 2px 0 #0B2150;
  letter-spacing:0.08em;transform:rotate(-2deg);
  font-family:'Playfair Display',serif;
}
.caption{padding:0 14px 10px;font-size:13px;color:#0B2150;line-height:1.55;}
.mention-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:#FA922220;color:#FA9223;
  border-radius:99px;padding:3px 10px;
  font-size:11px;font-weight:800;
  border:1.5px solid #FA922240;
  margin-left:14px;
}
.action-row{display:flex;align-items:center;gap:16px;padding:0 14px 12px;}
.action-btn{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:700;color:#0B2150;opacity:0.55;
  padding:4px;border-radius:8px;
  transition:opacity .15s,transform .15s;
}
.action-btn:hover{opacity:1;transform:scale(1.1);}
.action-btn.bookmark{margin-left:auto;}
.add-scrapbook-btn{
  margin:0 14px 14px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:#EBF5F5;color:#5CA4A4;
  border:2px solid #5CA4A4;
  border-radius:99px;padding:10px 16px;
  font-weight:800;font-size:13px;cursor:pointer;
  font-family:'Nunito',sans-serif;
  box-shadow:2px 2px 0 #5CA4A4;
}
.scrapbook-title{
  padding:4px 14px 8px;
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;color:#0B2150;
  line-height:1.1;
}
.photo-mosaic{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;margin:0 13px 10px;border-radius:16px;overflow:hidden;
}
.mosaic-cell{
  height:100px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;font-size:28px;
}
.scrapbook-meta{
  padding:0 14px 10px;font-size:12px;color:#0B2150;opacity:0.5;
  display:flex;align-items:center;gap:6px;
}
.scrapbook-cta{
  margin:0 14px 10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#FA9223;color:white;border:none;border-radius:99px;
  padding:13px 20px;font-weight:800;font-size:14px;cursor:pointer;
  box-shadow:3px 3px 0 #0B2150;font-family:'Nunito',sans-serif;
}
.saves-count{padding:0 14px 14px;font-size:12px;color:#0B2150;opacity:0.45;font-weight:600;}
.coauthor-avatars{display:flex;align-items:center;}
.coauthor-avatars .post-avatar:not(:first-child){margin-left:-12px;}
.coauthor-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:#FFB4AD40;color:#c44;
  border-radius:99px;padding:3px 10px;
  font-size:11px;font-weight:800;
  border:1.5px solid #FFB4AD;
  margin-left:14px;
}
.coauthor-badge{
  position:absolute;top:10px;right:10px;
  background:#FFB4AD;color:#0B2150;
  border-radius:99px;padding:3px 9px;
  font-size:10px;font-weight:800;
  border:1.5px solid #0B2150;
  box-shadow:1px 1px 0 #0B2150;
}

/* ── BELL + AVATAR ── */
.bell-btn{
  width:34px;height:34px;border-radius:50%;
  background:rgba(11,33,80,0.07);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;position:relative;
  transition:background .15s,transform .15s;
}
.bell-btn:hover{background:rgba(11,33,80,0.13);transform:scale(1.06);}
.bell-dot{
  position:absolute;top:6px;right:6px;
  width:7px;height:7px;border-radius:50%;
  background:#FA9223;border:1.5px solid #EAE7DA;
}

/* ── DRAWER (scoped to artboard) ── */
.drawer-backdrop{
  position:absolute;inset:0;z-index:200;
  background:rgba(11,33,80,0.35);
}
.drawer-panel{
  position:absolute;top:0;left:0;bottom:0;
  width:min(82%,320px);
  background:#EAE7DA;
  background-image:radial-gradient(circle,#0B215010 1px,transparent 1px);
  background-size:18px 18px;
  border-radius:0 28px 28px 0;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:6px 0 32px rgba(11,33,80,0.14);
  z-index:201;
}
.mm-nav-item{transition:background .15s,padding-left .15s;cursor:pointer;}
.mm-nav-item:hover{background:rgba(11,33,80,0.05)!important;padding-left:26px!important;}
.mm-icon-btn{transition:background .15s,transform .15s;border-radius:8px;}
.mm-icon-btn:hover{background:rgba(11,33,80,0.12)!important;transform:scale(1.06);}
.mm-scroll::-webkit-scrollbar{width:0;}.mm-scroll{scrollbar-width:none;}

/* desktop sidebar */
.desktop-sidebar-item{transition:background .15s,padding-left .15s;}
.desktop-sidebar-item:hover{background:rgba(11,33,80,0.06);padding-left:28px!important;}

.feed-scroll::-webkit-scrollbar{width:0;}
.feed-scroll{scrollbar-width:none;}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useState } = React;

/* ── Mascot ── */
function Mascot({ size=80, handUp=false, color="#0B2150" }) {
  return (
    <svg width={size} height={size*1.3} viewBox="0 0 100 130" fill="none">
      <rect x="38" y="72" width="12" height="35" rx="4" fill={color}/>
      <rect x="52" y="72" width="12" height="35" rx="4" fill={color}/>
      <ellipse cx="44" cy="109" rx="10" ry="5" fill={color}/>
      <ellipse cx="58" cy="109" rx="10" ry="5" fill={color}/>
      <circle cx="50" cy="42" r="32" fill="white" stroke={color} strokeWidth="3"/>
      <path d="M72 16 L82 26 L72 26 Z" fill="#EAE7DA" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      <ellipse cx="42" cy="42" rx="3" ry="4" fill={color}/>
      <ellipse cx="58" cy="42" rx="3" ry="4" fill={color}/>
      {handUp && <>
        <line x1="50" y1="80" x2="20" y2="55" stroke={color} strokeWidth="3" strokeLinecap="round"/>
        <circle cx="16" cy="52" r="5" fill={color}/>
        <text x="2" y="40" fontSize="18" fill={color} fontWeight="bold">?</text>
      </>}
    </svg>
  );
}

/* ── PeelCorner ── */
function PeelCorner({ size=48, fromColor="#5CA4A4" }) {
  const S=size, id=`pc-${fromColor.replace('#','')}${S}`;
  return (
    <div style={{position:"absolute",top:0,right:0,width:S,height:S,pointerEvents:"none",zIndex:4}}>
      <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} fill="none">
        <defs>
          <filter id={`shd-${id}`} x="-40%" y="-40%" width="200%" height="200%">
            <feDropShadow dx="-2" dy="2" stdDeviation="3" floodColor="rgba(0,0,0,0.22)"/>
          </filter>
          <linearGradient id={`grd-${id}`} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#f9f6ef"/>
            <stop offset="55%" stopColor="#EAE7DA"/>
            <stop offset="100%" stopColor="#d6d2c3"/>
          </linearGradient>
        </defs>
        <ellipse cx={S*.6} cy={S*.4} rx={S*.28} ry={S*.16}
          transform={`rotate(-45 ${S*.6} ${S*.4})`} fill="rgba(0,0,0,0.11)"/>
        <path d={`M${S} 0 L${S} ${S*.8} Q${S*.86} ${S*.5} ${S*.2} 0 Z`}
          fill={`url(#grd-${id})`} filter={`url(#shd-${id})`}/>
        <path d={`M${S*.2} 0 Q${S*.58} ${S*.24} ${S} ${S*.8}`}
          stroke={fromColor} strokeWidth="0.7" strokeDasharray="3 2" opacity="0.3" fill="none"/>
      </svg>
    </div>
  );
}

function PhotoBg({ color="#5CA4A4", emoji, height=220, label="" }) {
  return (
    <div style={{
      width:"100%",height,background:color,
      display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",gap:10,
      position:"relative",overflow:"hidden"
    }}>
      <div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(-45deg,transparent,transparent 9px,rgba(255,255,255,0.12) 9px,rgba(255,255,255,0.12) 10px)"}}/>
      <span style={{fontSize:48,filter:"drop-shadow(0 3px 8px rgba(0,0,0,0.25))"}}>{emoji}</span>
      <span style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.7)",letterSpacing:"0.14em",textTransform:"uppercase",textAlign:"center",padding:"0 16px"}}>{label}</span>
    </div>
  );
}

/* ── Icons ── */
const IconHeart = ({filled=false})=> <svg width="18" height="18" viewBox="0 0 24 24" fill={filled?"#FA9223":"none"} stroke={filled?"#FA9223":"#0B2150"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
const IconComment = ()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
const IconShare = ()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;
const IconBookmark = ()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>;
const IconArrow = ()=> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>;
const IconHouse = ()=> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const IconStore = ()=> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l1.5-5h15L21 9"/><path d="M4 9v11h16V9"/><path d="M9 14h6"/></svg>;
const IconQR = ()=> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 17v4h-4M14 21h0"/></svg>;
const IconMapPin = ()=> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
const IconUser = ()=> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const IconBell = ()=> <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0B2150" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
const IconPin = ()=> <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>;
const IconScrapbook = ()=> <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>;
const IconPlus = ()=> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FA9223" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

/* ── DATA ── */
const STORIES = [
  { id:"you",   label:"Tu viaje", plus:true,  bg:"#EAE7DA", border:"#FA9223" },
  { id:"s1",    label:"@martina", plus:false, bg:"#5CA4A4",  border:"#0B2150", emoji:"🏛️", city:"Roma"   },
  { id:"s2",    label:"@arthur",  plus:false, bg:"#FA9223",  border:"#0B2150", emoji:"🌊", city:"Bali"   },
  { id:"s3",    label:"@lucas",   plus:false, bg:"#FFB4AD",  border:"#0B2150", emoji:"🗼", city:"Lisboa" },
  { id:"s4",    label:"@sara",    plus:false, bg:"#066FB4",  border:"#0B2150", emoji:"🌸", city:"Kyoto"  },
  { id:"s5",    label:"@leo",     plus:false, bg:"#0B2150",  border:"#5CA4A4", emoji:"🏔️", city:"Nepal"  },
];

const NAV_ITEMS = [
  { label:"Viajes", icon:"✈️", href:"MementoMundi Home.html" },
  { label:"RRSS", icon:"🌍", active:true },
  { label:"Tienda", icon:"🛒", href:"MementoMundi Tienda.html" },
  { label:"Favoritos", icon:"❤️" },
  { label:"Carrito", icon:"🧺" },
  { label:"Usuario", icon:"👤" },
  { label:"Sobre Nosotros", icon:"💛" },
];

/* ── Stories Row ── */
function StoriesRow() {
  return (
    <div style={{padding:"14px 16px 10px",flexShrink:0}}>
      <p style={{fontSize:12,fontWeight:800,color:"#0B2150",opacity:0.45,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>Viajes en directo</p>
      <div className="stories-scroll">
        {STORIES.map(s => (
          <div key={s.id} className="story-item">
            <div className="story-avatar">
              <div className="story-avatar-inner" style={{
                background: s.plus ? "rgba(11,33,80,0.05)" : s.bg,
                border:`2.5px solid ${s.border}`,
                boxShadow:`2px 2px 0 ${s.border}`
              }}>
                {s.plus ? <IconPlus/> : <span style={{fontSize:24}}>{s.emoji}</span>}
              </div>
              {s.city && <div className="story-pin">📍{s.city}</div>}
            </div>
            <span className="story-label" style={{color:s.plus?"#FA9223":undefined,opacity:s.plus?1:0.6}}>
              {s.plus?"Tu viaje":s.label}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Posts ── */
function Post1() {
  const [liked,setLiked] = useState(false);
  return (
    <div className="post-card">
      <PeelCorner size={48} fromColor="#5CA4A4"/>
